name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    name: Code-Qualität (PHP 8.3)
    runs-on: ubuntu-latest

    steps:
      - name: Quellcode auschecken
        uses: actions/checkout@v5

      - name: PHP 8.3 einrichten
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, curl, zip
          tools: composer:v2

      - name: Composer-Cache laden
        uses: actions/cache@v5
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Abhängigkeiten installieren
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Security-Audit
        run: composer audit

      - name: Code-Style prüfen
        run: composer cs-check

      - name: Statische Analyse (PHPStan Level 8)
        run: composer phpstan

      - name: Tests ausführen
        run: composer test
